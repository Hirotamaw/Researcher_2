<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chain Lens — Blockchain & DeFi Research</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0e17;
    --bg2: #0f1520;
    --bg3: #141c2e;
    --surface: #1a2236;
    --surface2: #1f2a40;
    --border: rgba(99,179,237,0.12);
    --border2: rgba(99,179,237,0.22);
    --accent: #4fffb0;
    --accent2: #00d4ff;
    --accent3: #7c6dff;
    --text: #e8f0fe;
    --text2: #8ba0c0;
    --text3: #4a6080;
    --danger: #ff6b6b;
    --mono: 'DM Mono', monospace;
    --sans: 'DM Sans', sans-serif;
    --display: 'Syne', sans-serif;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
    overflow-x: hidden;
  }
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(99,179,237,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(99,179,237,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }
  .container { max-width: 1000px; margin: 0 auto; padding: 0 24px; position: relative; z-index: 1; }

  /* Header */
  header { padding: 48px 0 40px; border-bottom: 1px solid var(--border); }
  .logo {
    font-family: var(--display); font-size: 11px; font-weight: 600;
    letter-spacing: 0.3em; text-transform: uppercase; color: var(--accent);
    margin-bottom: 20px; display: flex; align-items: center; gap: 8px;
  }
  .logo-dot {
    width: 6px; height: 6px; background: var(--accent); border-radius: 50%;
    animation: pulse 2s infinite;
  }
  @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.4;transform:scale(0.8)} }
  h1 {
    font-family: var(--display); font-size: clamp(32px,5vw,52px); font-weight: 800;
    line-height: 1.1; letter-spacing: -0.02em;
    background: linear-gradient(135deg, #e8f0fe 0%, var(--accent2) 50%, var(--accent) 100%);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text; margin-bottom: 12px;
  }
  .subtitle { font-size: 15px; color: var(--text2); font-weight: 300; line-height: 1.6; max-width: 520px; }

  /* Search */
  .search-section { padding: 48px 0 32px; }
  .category-toggle {
    display: inline-flex; background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; padding: 4px; margin-bottom: 28px; gap: 2px;
  }
  .cat-btn {
    padding: 10px 24px; border: none; border-radius: 9px; background: transparent;
    color: var(--text2); font-family: var(--display); font-size: 13px; font-weight: 600;
    letter-spacing: 0.05em; cursor: pointer; transition: all 0.2s; text-transform: uppercase;
  }
  .cat-btn.active { background: var(--bg3); color: var(--text); box-shadow: 0 0 0 1px var(--border2); }
  .cat-btn[data-cat="blockchain"].active { color: var(--accent2); }
  .cat-btn[data-cat="defi"].active { color: var(--accent); }
  .search-bar { display: flex; gap: 12px; align-items: stretch; }
  .search-input-wrap { flex: 1; position: relative; }
  .search-icon {
    position: absolute; left: 16px; top: 50%; transform: translateY(-50%);
    color: var(--text3); font-size: 16px; pointer-events: none;
  }
  .search-input {
    width: 100%; background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; padding: 16px 16px 16px 44px; color: var(--text);
    font-family: var(--sans); font-size: 16px; font-weight: 300; outline: none;
    transition: border-color 0.2s, background 0.2s;
  }
  .search-input:focus { border-color: var(--border2); background: var(--surface2); }
  .search-input::placeholder { color: var(--text3); }
  .search-btn {
    background: var(--accent); border: none; border-radius: 12px; padding: 0 28px;
    color: #0a0e17; font-family: var(--display); font-size: 14px; font-weight: 700;
    letter-spacing: 0.05em; text-transform: uppercase; cursor: pointer; transition: all 0.2s; white-space: nowrap;
  }
  .search-btn:hover { opacity: 0.88; transform: translateY(-1px); }
  .search-btn:active { transform: translateY(0); }
  .search-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
  .quick-picks { margin-top: 14px; display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
  .quick-label { font-size: 12px; color: var(--text3); font-family: var(--mono); }
  .quick-chip {
    font-family: var(--mono); font-size: 11px; padding: 4px 12px; border-radius: 100px;
    border: 1px solid var(--border); background: transparent; color: var(--text2);
    cursor: pointer; transition: all 0.15s;
  }
  .quick-chip:hover { border-color: var(--border2); color: var(--text); background: var(--surface); }

  /* Loading */
  .loading-state { display: none; padding: 60px 0; text-align: center; }
  .loading-state.visible { display: block; }
  .loading-ring {
    width: 48px; height: 48px; border: 2px solid var(--border); border-top-color: var(--accent);
    border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 20px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-text { font-family: var(--mono); font-size: 13px; color: var(--text2); }
  .loading-step { font-size: 12px; color: var(--text3); margin-top: 8px; min-height: 18px; }

  /* Error */
  .error-box {
    display: none; background: rgba(255,107,107,0.08); border: 1px solid rgba(255,107,107,0.2);
    border-radius: 12px; padding: 20px 24px; margin: 24px 0; color: var(--danger);
    font-size: 14px; line-height: 1.6;
  }
  .error-box.visible { display: block; }

  /* Results */
  #results { padding-bottom: 80px; }
  .result-header {
    display: flex; align-items: flex-end; justify-content: space-between;
    margin-bottom: 32px; padding-bottom: 20px; border-bottom: 1px solid var(--border);
    flex-wrap: wrap; gap: 16px;
  }
  .result-name {
    font-family: var(--display); font-size: clamp(28px,4vw,42px); font-weight: 800;
    letter-spacing: -0.02em; color: var(--text); line-height: 1.1;
  }
  .result-badge {
    font-family: var(--mono); font-size: 11px; padding: 5px 14px;
    border-radius: 100px; text-transform: uppercase; letter-spacing: 0.1em;
  }
  .result-badge.blockchain { background: rgba(0,212,255,0.1); color: var(--accent2); border: 1px solid rgba(0,212,255,0.2); }
  .result-badge.defi { background: rgba(79,255,176,0.1); color: var(--accent); border: 1px solid rgba(79,255,176,0.2); }
  .metrics-strip { display: grid; grid-template-columns: repeat(auto-fit,minmax(140px,1fr)); gap: 12px; margin-bottom: 32px; }
  .metric-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 16px; }
  .metric-label { font-family: var(--mono); font-size: 10px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.12em; margin-bottom: 6px; }
  .metric-value { font-family: var(--display); font-size: 15px; font-weight: 600; color: var(--text); line-height: 1.3; }
  .section-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 16px; }
  @media (max-width: 640px) { .section-grid { grid-template-columns: 1fr; } }
  .info-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 20px 22px; }
  .info-card.wide { grid-column: 1 / -1; }
  .info-card-title {
    font-family: var(--mono); font-size: 10px; text-transform: uppercase;
    letter-spacing: 0.14em; color: var(--text3); margin-bottom: 12px;
    display: flex; align-items: center; gap: 8px;
  }
  .info-card-title::before {
    content: ''; display: inline-block; width: 6px; height: 6px;
    border-radius: 2px; background: var(--accent); flex-shrink: 0;
  }
  .info-card-content { font-size: 14px; color: var(--text2); line-height: 1.7; }
  .feature-list { list-style: none; display: flex; flex-direction: column; gap: 8px; }
  .feature-list li { font-size: 13px; color: var(--text2); padding-left: 16px; position: relative; line-height: 1.5; }
  .feature-list li::before { content: '→'; position: absolute; left: 0; color: var(--accent); font-size: 11px; top: 1px; }
  .timeline { display: flex; flex-direction: column; gap: 0; }
  .timeline-item { display: grid; grid-template-columns: 80px 1fr; gap: 16px; position: relative; padding-bottom: 16px; }
  .timeline-item:not(:last-child)::before {
    content: ''; position: absolute; left: 36px; top: 22px; bottom: 0; width: 1px; background: var(--border);
  }
  .timeline-year { font-family: var(--mono); font-size: 12px; font-weight: 500; color: var(--accent2); padding-top: 3px; text-align: right; }
  .timeline-event { font-size: 13px; color: var(--text2); line-height: 1.5; padding-top: 2px; padding-left: 12px; border-left: 1px solid var(--border2); }
  .partner-tags { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 4px; }
  .partner-tag { font-family: var(--mono); font-size: 11px; padding: 4px 12px; border-radius: 6px; background: var(--bg3); border: 1px solid var(--border); color: var(--text2); }
  .source-note { margin-top: 32px; padding: 14px 18px; background: rgba(124,109,255,0.06); border: 1px solid rgba(124,109,255,0.15); border-radius: 10px; font-size: 12px; color: var(--text3); line-height: 1.6; }
  .dune-placeholder { margin-top: 16px; border: 1px dashed var(--border); border-radius: 12px; padding: 24px; text-align: center; }
  .dune-placeholder p { font-family: var(--mono); font-size: 12px; color: var(--text3); margin-bottom: 8px; }
  .dune-placeholder .dune-label { font-size: 11px; color: var(--text3); background: var(--surface); border: 1px solid var(--border); display: inline-block; padding: 4px 12px; border-radius: 100px; }
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--surface2); border-radius: 3px; }
</style>
</head>
<body>
<div class="container">

  <header>
    <div class="logo"><span class="logo-dot"></span>Chain Lens Research</div>
    <h1>Blockchain & DeFi<br>Intelligence</h1>
    <p class="subtitle">プロジェクト名を入力するだけで、ブロックチェーン・DeFiの詳細情報を即座に調査・整理します</p>
  </header>

  <div class="search-section">
    <div class="category-toggle">
      <button class="cat-btn active" data-cat="blockchain" onclick="setCategory('blockchain')">⬡ Blockchain</button>
      <button class="cat-btn" data-cat="defi" onclick="setCategory('defi')">◈ DeFi</button>
    </div>
    <div class="search-bar">
      <div class="search-input-wrap">
        <span class="search-icon">⌕</span>
        <input type="text" class="search-input" id="searchInput"
          placeholder="例: Ethereum, Solana, Avalanche..."
          onkeydown="if(event.key==='Enter') doSearch()">
      </div>
      <button class="search-btn" id="searchBtn" onclick="doSearch()">調査する</button>
    </div>
    <div class="quick-picks" id="quickPicks"></div>
  </div>

  <div class="loading-state" id="loadingState">
    <div class="loading-ring"></div>
    <div class="loading-text">調査中...</div>
    <div class="loading-step" id="loadingStep">情報を収集しています</div>
  </div>

  <div class="error-box" id="errorBox"></div>
  <div id="results"></div>

</div>
<script>
// APIキーはサーバー側（Vercel）にのみ存在します
// ブラウザ側にはキーは一切ありません
const API_URL = '/api/ask';

const QUICK_PICKS = {
  blockchain: ['Ethereum','Solana','Avalanche','Polygon','Bitcoin','Cardano'],
  defi: ['Uniswap','Aave','Lido','Curve Finance','EigenLayer','Compound']
};
let currentCategory = 'blockchain';

function setCategory(cat) {
  currentCategory = cat;
  document.querySelectorAll('.cat-btn').forEach(b => b.classList.toggle('active', b.dataset.cat === cat));
  document.getElementById('searchInput').placeholder =
    cat === 'blockchain' ? '例: Ethereum, Solana, Avalanche...' : '例: Uniswap, Aave, Lido...';
  renderQuickPicks();
}

function renderQuickPicks() {
  document.getElementById('quickPicks').innerHTML =
    '<span class="quick-label">例：</span>' +
    QUICK_PICKS[currentCategory].map(p =>
      `<button class="quick-chip" onclick="quickSearch('${p}')">${p}</button>`).join('');
}

function quickSearch(name) {
  document.getElementById('searchInput').value = name;
  doSearch();
}

function buildBlockchainPrompt(name) {
  return `あなたはブロックチェーン・暗号資産分野の専門アナリストです。
「${name}」というブロックチェーンについて調査し、以下のJSONスキーマに従ってJSONのみを返してください。
マークダウン記法（\`\`\`json など）は使わず、JSONオブジェクトだけを返してください。
情報が不明な場合は "情報なし" を使用してください。

{
  "official_name": "正式名称",
  "native_token": "ネイティブトークン名とシンボル（例: Ether / ETH）",
  "governance": "運営体名（DAO名・Foundation名・企業名）",
  "market_cap": "時価総額の概算（例: 約40兆円／2024年時点）",
  "consensus": "コンセンサスアルゴリズム",
  "overview": "プロジェクト概要（200〜300文字）",
  "technical_features": ["技術的特徴1", "技術的特徴2", "技術的特徴3"],
  "evm_compatible": "EVM互換性（対応 / 非対応 / 部分対応）",
  "smart_contract": "スマートコントラクト対応（対応 / 非対応）",
  "use_cases": ["想定ユースケース1", "想定ユースケース2", "想定ユースケース3"],
  "history": [{"year": 2015, "event": "出来事の説明"}],
  "future_roadmap": "今後の戦略・アップデート方針（100〜200文字）",
  "partnerships": ["連携実績1（金融機関・決済業者・取引所など）", "連携実績2"],
  "ecosystem": ["主要dApps・エコシステムプロジェクト1", "エコシステムプロジェクト2"],
  "security_incidents": "主なセキュリティインシデント（なければ「特記なし」）",
  "major_wallets": ["対応主要ウォレット1", "対応主要ウォレット2"]
}`;
}

function buildDefiPrompt(name) {
  return `あなたはDeFi・ブロックチェーン分野の専門アナリストです。
「${name}」というDeFiプロジェクトについて調査し、以下のJSONスキーマに従ってJSONのみを返してください。
マークダウン記法（\`\`\`json など）は使わず、JSONオブジェクトだけを返してください。
情報が不明な場合は "情報なし" を使用してください。

{
  "official_name": "正式名称",
  "governance": "運営体名（DAO名・Foundation名・企業名）",
  "tvl": "TVL（Total Value Locked）の概算（例: 約50億ドル／2024年時点）",
  "category": "DeFiカテゴリー（DEX / レンディング / ステーキング / リステーキング / イールドアグリゲーター など）",
  "governance_token": "ガバナンストークン名とシンボル",
  "chains": ["対応ブロックチェーン1", "対応ブロックチェーン2"],
  "overview": "プロジェクト概要（200〜300文字）",
  "technical_features": ["技術的特徴1", "技術的特徴2", "技術的特徴3"],
  "use_cases": ["想定ユースケース1", "想定ユースケース2", "想定ユースケース3"],
  "history": [{"year": 2018, "event": "出来事の説明"}],
  "future_roadmap": "今後の戦略・アップデート方針（100〜200文字）",
  "partnerships": ["連携実績1（金融機関・決済業者・取引所など）", "連携実績2"],
  "audits": ["セキュリティ監査法人1", "セキュリティ監査法人2"],
  "security_incidents": "主なセキュリティインシデント・ハッキング歴（なければ「特記なし」）",
  "volume": "累計取引量の概算"
}`;
}

async function callGeminiAPI(prompt) {
  const res = await fetch(API_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ prompt })
  });
  const data = await res.json();
  if (!res.ok) throw new Error(data.error || `APIエラー: ${res.status}`);
  if (!data.text) throw new Error('APIからの応答が空でした');
  return data.text;
}

function parseJSON(raw) {
  let cleaned = raw
    .replace(/```json\s*/g, '')
    .replace(/```\s*/g, '')
    .trim();
  const s = cleaned.indexOf('{');
  const e = cleaned.lastIndexOf('}');
  if (s === -1 || e === -1) throw new Error('レスポンスからJSONを取得できませんでした');
  cleaned = cleaned.slice(s, e + 1);
  try {
    return JSON.parse(cleaned);
  } catch(e1) {
    cleaned = cleaned
      .replace(/,\s*}/g, '}')
      .replace(/,\s*]/g, ']');
    try {
      return JSON.parse(cleaned);
    } catch(e2) {
      throw new Error('JSONの解析に失敗しました。もう一度お試しください。');
    }
  }
}

function renderList(arr) {
  if (!arr || !arr.length) return '<li>情報なし</li>';
  return arr.map(i => `<li>${i}</li>`).join('');
}

function renderTimeline(history) {
  if (!history || !history.length) return '<p style="color:var(--text3);font-size:13px">情報なし</p>';
  return [...history].sort((a,b) => (a.year||0)-(b.year||0)).map(h => `
    <div class="timeline-item">
      <div class="timeline-year">${h.year||'?'}</div>
      <div class="timeline-event">${h.event||''}</div>
    </div>`).join('');
}

function renderTags(arr) {
  if (!arr || !arr.length) return '<span class="partner-tag">情報なし</span>';
  return arr.map(p => `<span class="partner-tag">${p}</span>`).join('');
}

function renderBlockchainResult(d) {
  return `
    <div class="result-header">
      <div>
        <div class="result-name">${d.official_name||'—'}</div>
        <div style="margin-top:6px;font-size:14px;color:var(--text2);font-family:var(--mono)">${d.native_token||''}</div>
      </div>
      <span class="result-badge blockchain">Blockchain</span>
    </div>
    <div class="metrics-strip">
      <div class="metric-card"><div class="metric-label">時価総額</div><div class="metric-value">${d.market_cap||'—'}</div></div>
      <div class="metric-card"><div class="metric-label">コンセンサス</div><div class="metric-value">${d.consensus||'—'}</div></div>
      <div class="metric-card"><div class="metric-label">EVM互換</div><div class="metric-value">${d.evm_compatible||'—'}</div></div>
      <div class="metric-card"><div class="metric-label">スマートコントラクト</div><div class="metric-value">${d.smart_contract||'—'}</div></div>
      <div class="metric-card"><div class="metric-label">運営体</div><div class="metric-value">${d.governance||'—'}</div></div>
    </div>
    <div class="section-grid">
      <div class="info-card wide"><div class="info-card-title">概要</div><div class="info-card-content">${d.overview||'情報なし'}</div></div>
      <div class="info-card"><div class="info-card-title">技術的特徴</div><div class="info-card-content"><ul class="feature-list">${renderList(d.technical_features)}</ul></div></div>
      <div class="info-card"><div class="info-card-title">想定ユースケース</div><div class="info-card-content"><ul class="feature-list">${renderList(d.use_cases)}</ul></div></div>
      <div class="info-card"><div class="info-card-title">主要ウォレット対応</div><div class="info-card-content"><ul class="feature-list">${renderList(d.major_wallets)}</ul></div></div>
      <div class="info-card"><div class="info-card-title">エコシステム</div><div class="info-card-content"><ul class="feature-list">${renderList(d.ecosystem)}</ul></div></div>
      <div class="info-card wide"><div class="info-card-title">開発歴・アップグレードの歴史</div><div class="info-card-content"><div class="timeline">${renderTimeline(d.history)}</div></div></div>
      <div class="info-card wide"><div class="info-card-title">今後の戦略・アップデート方針</div><div class="info-card-content">${d.future_roadmap||'情報なし'}</div></div>
      <div class="info-card wide"><div class="info-card-title">金融機関・決済業者・取引所との連携実績</div><div class="info-card-content"><div class="partner-tags">${renderTags(d.partnerships)}</div></div></div>
      <div class="info-card wide"><div class="info-card-title">セキュリティインシデント</div><div class="info-card-content">${d.security_incidents||'情報なし'}</div></div>
    </div>
    <div class="dune-placeholder">
      <p>📊 オンチェーンデータ（Dune Analytics連携）</p>
      <span class="dune-label">Dune API拡張ポイント — Phase 2で実装予定</span>
    </div>
    <div class="source-note">⚠ 本情報はGemini AIによる生成情報です。時価総額等の数値は概算であり、最新データはCoinMarketCap・CoinGecko等でご確認ください。投資判断等には使用しないでください。</div>`;
}

function renderDefiResult(d) {
  return `
    <div class="result-header">
      <div>
        <div class="result-name">${d.official_name||'—'}</div>

const LOADING_STEPS = [
  'プロンプトを生成しています...',
  'Gemini AIに送信中...',
  '情報を収集・整理中...',
  'データを構造化しています...',
  'もうすぐ完了です...'
];

async function doSearch() {
  const query = document.getElementById('searchInput').value.trim();
  if (!query) { document.getElementById('searchInput').focus(); return; }

  document.getElementById('results').innerHTML = '';
  document.getElementById('errorBox').className = 'error-box';
  document.getElementById('loadingState').className = 'loading-state visible';
  document.getElementById('searchBtn').disabled = true;

  let stepIdx = 0;
  document.getElementById('loadingStep').textContent = LOADING_STEPS[0];
  const timer = setInterval(() => {
    stepIdx = Math.min(stepIdx + 1, LOADING_STEPS.length - 1);
    document.getElementById('loadingStep').textContent = LOADING_STEPS[stepIdx];
  }, 2000);

  try {
    const prompt = currentCategory === 'blockchain'
      ? buildBlockchainPrompt(query) : buildDefiPrompt(query);
    const raw = await callGeminiAPI(prompt);
    const data = parseJSON(raw);

    clearInterval(timer);
    document.getElementById('loadingState').className = 'loading-state';
    document.getElementById('searchBtn').disabled = false;

    const html = currentCategory === 'blockchain'
      ? renderBlockchainResult(data) : renderDefiResult(data);
    document.getElementById('results').innerHTML = html;
    document.getElementById('results').scrollIntoView({ behavior: 'smooth', block: 'start' });

  } catch (err) {
    clearInterval(timer);
    document.getElementById('loadingState').className = 'loading-state';
    document.getElementById('searchBtn').disabled = false;
    showError(`エラーが発生しました：${err.message}`);
  }
}

function showError(msg) {
  const box = document.getElementById('errorBox');
  box.textContent = msg;
  box.className = 'error-box visible';
}

window.addEventListener('DOMContentLoaded', renderQuickPicks);
</script>
